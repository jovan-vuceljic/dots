# Volume
9 add volume -5
0 add volume 5

UP add volume 2
DOWN add volume -2

k add volume 2
j add volume -2

# Seek backward / forward
LEFT seek -5
RIGHT seek 5

l seek 5 
h seek -5

# Bigger jumps
Shift+LEFT seek -30
Shift+RIGHT seek 30

# Precise nudge (Shift+h/l): 1s exact seek
H seek -1 exact
L seek 1 exact

# Playback speed
= add speed 0.1
- add speed -0.1
BS set speed 1.0          # backspace resets to normal

# Subtitle sync
z add sub-delay -0.1      # subs earlier
Z add sub-delay 0.1       # subs later

# Chapters
> add chapter 1
< add chapter -1

# A-B loop (moved off L to avoid the precise-nudge conflict)
b ab-loop

